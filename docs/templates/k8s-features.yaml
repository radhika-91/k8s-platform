# Copy to clusters/<your-cluster-name>/k8s-features.yaml and customize.
# Bootstrap that cluster with: make apply-root-app CLUSTER_CONFIG=<your-cluster-name>

git:
  repoURL: https://github.com/YOUR_ORG/k8s-platform.git
  revision: HEAD

cluster:
  name: CHANGE_ME
  environment: kind
  domain: local.dev

# Argo CD sync behaviour for generated feature Applications (defaults shown).
# Cluster-level syncPolicy applies to all features; override per feature under features.<name>.syncPolicy.
# syncPolicy:
#   automated: true
#   prune: true
#   selfHeal: true
#
# features:
#   certManager:
#     enabled: true
#     syncPolicy:
#       automated: false   # manual sync for this feature only

features:
  argocd:
    enabled: true
  storage:
    enabled: false
  ingress:
    enabled: false
  certManager:
    enabled: false
  externalSecrets:
    enabled: false
  observabilityLoki:
    enabled: false
  observabilityMimir:
    enabled: false
  observabilityTempo:
    enabled: false
  observabilityGrafana:
    enabled: false
  observabilityPrometheusOperatorCrds:
    enabled: false
  observabilityPrometheusOperatorCrds:
    enabled: false
    # Required for ServiceMonitor / PodMonitor scraping on the Alloy path
  observabilityK8sMonitoring:
    enabled: false
    # Alloy path — see platform/observability/k8s-monitoring/README.md
    # values:
    #   k8s-monitoring:
    #     cluster:
    #       name: my-cluster
  observabilityOtel:
    enabled: false
    # OTel path — alternative to k8s-monitoring; do not enable both
    # values:
    #   agents:
    #     logs: { enabled: true }
    #     nodeMetrics: { enabled: true }
    #     clusterMetrics: { enabled: true }
  policy:
    enabled: false
