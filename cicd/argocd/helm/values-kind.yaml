argo-cd:
  global:
    domain: argocd.local.dev

  configs:
    params:
      server.insecure: true

  server:
    service:
      type: NodePort
      nodePortHttp: 30080
      nodePortHttps: 30443

  redis:
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

  controller:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  repoServer:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  applicationSet:
    enabled: false
