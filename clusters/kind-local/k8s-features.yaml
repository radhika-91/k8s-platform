git:
  repoURL: https://github.com/radhika-91/k8s-platform.git
  revision: HEAD

cluster:
  name: kind-local
  environment: kind
  domain: local.dev

features:
  argocd:
    enabled: true
  storage:
    enabled: true
  ingress:
    enabled: false
  certManager:
    enabled: false
  externalSecrets:
    enabled: false
  observabilityLoki:
    enabled: true
  observabilityMimir:
    enabled: true
  observabilityTempo:
    enabled: true
  observabilityGrafana:
    enabled: true
  observabilityPrometheusOperatorCrds:
    enabled: true
  observabilityK8sMonitoring:
    enabled: true
  observabilityOtel:
    enabled: false
  policy:
    enabled: false
