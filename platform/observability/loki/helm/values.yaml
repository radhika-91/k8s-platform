# Loki (single binary — Kind-friendly)
loki:
  fullnameOverride: observability-loki
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    auth_enabled: false
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: false
  minio:
    enabled: false
  test:
    enabled: false
