# Tempo (single binary — OTLP ingest on :4317/:4318)
tempo:
  fullnameOverride: observability-tempo
  tempo:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    retention: 24h
  tempoQuery:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
