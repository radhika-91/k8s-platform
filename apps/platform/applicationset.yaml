apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-generators
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/YOUR_ORG/k8s-platform.git
        revision: HEAD
        files:
          - path: clusters/*/cluster.yaml
  template:
    metadata:
      name: "{{ .cluster.name }}-platform"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform
      source:
        repoURL: https://github.com/YOUR_ORG/k8s-platform.git
        targetRevision: HEAD
        path: apps/platform/chart
        helm:
          valueFiles:
            - ../../../clusters/{{ .cluster.name }}/cluster.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
