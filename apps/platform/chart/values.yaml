git:
  repoURL: https://github.com/radhika-91/k8s-platform.git
  revision: HEAD

# Namespace for platform Application CRs and their deployed workloads
namespace: platform

# Override per cluster in k8s-features.yaml; per-feature overrides under features.<name>.syncPolicy
syncPolicy:
  automated: true
  prune: true
  selfHeal: true

# Feature metadata — toggles live in clusters/<name>/k8s-features.yaml
featureDefinitions:
  storage:
    name: storage
    path: platform/storage/helm
    syncWave: "1"
  externalSecrets:
    name: external-secrets
    path: platform/external-secrets/helm
    syncWave: "2"
  ingress:
    name: ingress
    path: platform/ingress/helm
    syncWave: "3"
  certManager:
    name: cert-manager
    path: platform/cert-manager/helm
    syncWave: "4"
  observabilityLoki:
    name: observability-loki
    path: platform/observability/loki/helm
    syncWave: "5"
  observabilityMimir:
    name: observability-mimir
    path: platform/observability/mimir/helm
    syncWave: "5"
  observabilityTempo:
    name: observability-tempo
    path: platform/observability/tempo/helm
    syncWave: "5"
  observabilityGrafana:
    name: observability-grafana
    path: platform/observability/grafana/helm
    syncWave: "6"
  observabilityPrometheusOperatorCrds:
    name: observability-prometheus-operator-crds
    path: platform/observability/prometheus-operator-crds/helm
    syncWave: "6"
  observabilityK8sMonitoring:
    name: observability-k8s-monitoring
    path: platform/observability/k8s-monitoring/helm
    syncWave: "7"
  observabilityOtel:
    name: observability-otel
    path: platform/observability/otel/helm
    syncWave: "8"
  policy:
    name: policy
    path: platform/policy/helm
    syncWave: "9"

features: {}
