{{/*
Expand featureDefinitions into Argo CD Application manifests for enabled features.
Cluster values file (clusters/<name>/k8s-features.yaml) provides .Values.features, .Values.cluster,
and optional .Values.syncPolicy (cluster defaults). Per-feature syncPolicy overrides cluster defaults.
Application CRs and workloads deploy to .Values.namespace (default: platform).
*/}}
{{- $platformNs := .Values.namespace | default "platform" }}
{{- range $key, $def := .Values.featureDefinitions }}
{{- $feature := index $.Values.features $key | default dict }}
{{- $chartDepth := len (splitList "/" $def.path) }}
{{- $repoRootRel := "" }}
{{- range until $chartDepth }}
{{- $repoRootRel = printf "%s../" $repoRootRel }}
{{- end }}
{{- if $feature.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $def.name }}
  namespace: {{ $platformNs }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ $def.syncWave | quote }}
  labels:
    platform.feature: {{ $key }}
    platform.cluster: {{ $.Values.cluster.name }}
spec:
  project: platform
  source:
    repoURL: {{ $.Values.git.repoURL | quote }}
    targetRevision: {{ $.Values.git.revision | quote }}
    path: {{ $def.path }}
    helm:
      valueFiles:
        - values.yaml
        - {{ $repoRootRel }}environments/base/features.yaml
        {{- if $.Values.cluster.environment }}
        - {{ $repoRootRel }}environments/{{ $.Values.cluster.environment }}/features.yaml
        - values-{{ $.Values.cluster.environment }}.yaml
        {{- end }}
      {{- with $feature.values }}
      values: |
        {{- toYaml . | nindent 8 }}
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $platformNs }}
  syncPolicy:
{{ include "platform-apps.syncPolicySpec" (dict "clusterPolicy" ($.Values.syncPolicy | default dict) "featurePolicy" ($feature.syncPolicy | default dict)) | nindent 4 }}
{{- end }}
{{- end }}
