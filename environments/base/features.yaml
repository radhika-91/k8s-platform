# Safe defaults: all optional platform features disabled.
# Cluster-level k8s-features.yaml toggles override these at deploy time.

features:
  storage:
    enabled: false
  ingress:
    enabled: false
  certManager:
    enabled: false
  externalSecrets:
    enabled: false
  observabilityLoki:
    enabled: false
  observabilityMimir:
    enabled: false
  observabilityTempo:
    enabled: false
  observabilityGrafana:
    enabled: false
  observabilityPrometheusOperatorCrds:
    enabled: false
  observabilityK8sMonitoring:
    enabled: false
  observabilityOtel:
    enabled: false
  policy:
    enabled: false
